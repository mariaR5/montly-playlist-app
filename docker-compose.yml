services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: playlist_postgres
    environment:
      POSTGRES_DB: playlist
      POSTGRES_USER: playlist
      POSTGRES_PASSWORD: playlist
    ports:
      - "5433:5432"
    volumes:
      - playlist_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: playlist_redis
    ports:
      - "6379:6379"

volumes:
  playlist_postgres_data:
